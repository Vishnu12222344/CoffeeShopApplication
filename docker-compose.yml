version: "3.9"

services:

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: coffee_shop
    ports:
      - "3307:3306"

  backend:
    image: coffeeshop-backend:latest   # 👈 using existing image
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/coffee_shop
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - mysql

  frontend:
    image: coffeeshop-frontend:latest   # 👈 using existing image
    container_name: frontend
    ports:
      - "8081:8081"
    depends_on:
      - backend
